name: Morning News Briefing

on:
  schedule:
    # GitHub Actions cron runs in UTC.
    # 04:00 UTC = 06:00 SAST (South Africa, UTC+2).
    # Note: scheduled runs can be delayed a few minutes during peak load.
    - cron: "0 4 * * *"
  # Lets you trigger a manual test run from the Actions tab.
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send briefing
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # Optional overrides (uncomment in the workflow if you need them):
          # NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          # NTFY_TOKEN:  ${{ secrets.NTFY_TOKEN }}
          # MAX_PER_CAT: "5"
        run: python news_briefing.py
